name: TryHackMe Update Badge

on:
  schedule:
    - cron: "0 0 * * *"   # Runs once per day
  workflow_dispatch:       # Allows manual runs

permissions:
  contents: write

jobs:
  tryhackme-badge-update:
    name: Update TryHackMe Badge
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Required for commits

      - name: Generate TryHackMe badge
        uses: p4p1/tryhackme-badge-workflow@main
        with:
          username: "AlwaysInTheCage"
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push badge update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/thm_propic.png
          git commit -m "Update TryHackMe badge" || exit 0
          git push
